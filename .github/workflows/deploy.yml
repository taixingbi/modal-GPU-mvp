name: CI and Modal Deploy

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest

  deploy:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
      # Repo secret is currently named TOKEN_SECRET; rename it to
      # MODAL_TOKEN_SECRET in GitHub settings and update this line if desired.
      MODAL_TOKEN_SECRET: ${{ secrets.TOKEN_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Deploy smoke-test app
        run: modal deploy app.py

      - name: Deploy diffusers app
        run: modal deploy modal_diffusers.py
